name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 필요할 때 Actions 탭에서 직접 돌릴 수도 있게 한다
  workflow_dispatch:

# Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 배포가 겹치면 마지막 것만 살린다
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # sharp 는 네이티브 바이너리를 쓴다. ubuntu-latest(x64) 에서는 package-lock.json 에
      # 들어 있는 @img/sharp-linux-x64 / @img/sharp-libvips-linux-x64 를 npm ci 가
      # 그대로 내려받으므로 빌드 도구나 추가 설치가 필요 없다. 잠금 파일을 지우거나
      # --no-optional 을 붙이면 그때 깨진다 — 둘 다 하지 말 것.
      - run: npm ci

      # 이미지 굽기는 이 워크플로에서 제일 비싼 단계다(찬 캐시 ~190초, 따뜻하면 ~25초).
      # .image-cache 는 원본과 옵션만으로 재현되는 순수 산출물이라 캐시해도 안전하다.
      # 키에 원본 이미지와 optimize-images.mjs 를 함께 넣는 이유: 굽는 옵션(PLAN·
      # DEFAULT_LADDER·QUALITY)이 전부 그 스크립트 안에 있어서, 옵션만 바뀌고 원본이
      # 그대로일 때 옛 화질이 캐시에서 되살아나는 것을 막아야 한다.
      # restore-keys 는 부분 적중용이다 — 사진 한 장만 바뀌어도 나머지는 재사용된다
      # (스크립트가 파일 단위로 캐시 유효성을 다시 따진다).
      - name: 이미지 캐시
        uses: actions/cache@v4
        with:
          path: .image-cache
          key: ${{ runner.os }}-image-cache-${{ hashFiles('public/images/**', 'scripts/optimize-images.mjs') }}
          restore-keys: |
            ${{ runner.os }}-image-cache-

      - name: Build
        env:
          # 아래 값들은 `vite build` 하나가 아니라 **npm 생명주기 전체**가 읽는다.
          # npm run build 는 prebuild(optimize-images --stage) → build(vite) →
          # postbuild(optimize-images --emit → prerender → seo-assets →
          # hydration-check) 를 한 프로세스 트리에서 이어 돌리므로, 이 env 블록이
          # 그 모든 단계에 그대로 상속된다. 그래서 여기 한 곳에 다 모아 둔다.
          #
          # 프로젝트 사이트 주소는 https://계정.github.io/저장소이름/ 이다.
          # 저장소 이름을 직접 적지 않고 받아 써서, 이름을 바꿔도 그대로 동작하게 한다.
          # vite(base) · prerender(자산·라우트 주소) · seo-assets(sitemap) · hydration-check
          # 넷이 같은 값을 읽어야 한다. 하나라도 빠지면 하위경로 배포에서 링크가 깨진다.
          BASE_PATH: /${{ github.event.repository.name }}/
          # canonical·og:url·JSON-LD·sitemap 의 기준 origin (prerender.mjs·seo-assets.mjs).
          # **없으면 프리렌더는 성공하지만 구조화 데이터가 한 줄도 안 나가고
          # sitemap.xml 자체가 만들어지지 않는다.**
          #
          # 저장소 변수(Settings → Variables)에 SITE_ORIGIN 을 넣으면 그 값이 이긴다.
          # 경로 없이 origin 만 적을 것 — 뒤의 /저장소이름/ 은 BASE_PATH 가 붙인다.
          #   예) https://계정.github.io   또는 자체 도메인 https://example.com
          # 비워 두면 Supabase 의 seo_settings.site_url → src/lib/seoData.js 순으로 내려간다.
          # 여기서 github.repository_owner 로 주소를 지어내지 않는 이유: 그렇게 만든 값이
          # 실제 배포 주소보다 먼저 이겨 버린다. **틀린 canonical 은 없는 canonical 보다
          # 훨씬 나쁘다**(index.html 주석과 같은 원칙).
          SITE_ORIGIN: ${{ vars.SITE_ORIGIN }}
          # VITE_ 값은 빌드할 때 결과물에 박힌다. 바꾸면 다시 배포해야 반영된다.
          # prerender·hydration-check 도 vite SSR 로 src 를 불러오므로 같은 값을 봐야 한다 —
          # 다르면 프리렌더 HTML 과 번들이 어긋나 하이드레이션 검사에서 걸린다.
          # (비어 있어도 빌드는 통과한다. 그때는 정적 폴백 데이터로 그린다.)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_NAVER_MAP_CLIENT_ID: ${{ secrets.VITE_NAVER_MAP_CLIENT_ID }}
          VITE_NAVER_MAP_KEY_PARAM: ${{ secrets.VITE_NAVER_MAP_KEY_PARAM }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
