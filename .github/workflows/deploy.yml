name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 필요할 때 Actions 탭에서 직접 돌릴 수도 있게 한다
  workflow_dispatch:

# Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 배포가 겹치면 마지막 것만 살린다
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # 프로젝트 사이트 주소는 https://계정.github.io/저장소이름/ 이다.
          # 저장소 이름을 직접 적지 않고 받아 써서, 이름을 바꿔도 그대로 동작하게 한다.
          BASE_PATH: /${{ github.event.repository.name }}/
          # VITE_ 값은 빌드할 때 결과물에 박힌다. 바꾸면 다시 배포해야 반영된다.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_NAVER_MAP_CLIENT_ID: ${{ secrets.VITE_NAVER_MAP_CLIENT_ID }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
